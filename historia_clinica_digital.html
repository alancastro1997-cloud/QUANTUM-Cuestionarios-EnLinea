  pegar el texto en el Sheet. Reemplaza ese paso manual de punta a punta:
  al enviar, esto llega directo al mismo pipeline (Code.gs) que ya arma el
  Plan Integral con Claude, crea/actualiza el expediente del paciente, y
  genera automáticamente los consentimientos informados de los procedimientos
  que se marquen abajo (Sección 17-19 de la guía).

  Esta NO es la Historia Clínica Integral completa que exige un caso complejo
  de sub-especialidad — es el set de datos de exploración física + ficha de
  identificación que la NOM-004-SSA3-2012 pide como contenido mínimo, más los
  campos propios de medicina del deporte/rehabilitación (ROM, Daniels,
  dermatomas/miotomas, pruebas ortopédicas). Si un caso requiere algo muy

<style>
  :root{
    --bg:#F3F1EF;
    --surface:#FFFFFF;
    --ink:#1C1917;
    --ink-soft:#57534E;
    --ink-faint:#8A8580;
    --accent:#8B0000;
    --accent-dark:#5C0000;
    --accent-soft:#F5E6E6;
    --gold:#C89B3C;
    --line:#E7E4E2;
    --danger:#B4483C;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #hcd-root{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100vh;
    padding:28px 16px 60px;
    line-height:1.5;
  }
  #hcd-root .wrap{max-width:760px;margin:0 auto;}
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:22px;flex-wrap:wrap;gap:6px;
  }
  .brand-name{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:15px;letter-spacing:.06em;color:var(--ink);
  }
  .brand-tag{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);
    letter-spacing:.02em;
  }

  .orbit-wrap{margin:8px 0 26px;}
  .orbit-track{display:flex;align-items:center;gap:0;}
  .orbit-node{
    width:9px;height:9px;border-radius:50%;background:var(--line);
    flex:0 0 auto;transition:background .25s, transform .25s;position:relative;
  }
  .orbit-node.done{background:var(--accent);}
  .orbit-node.current{
    background:var(--surface);border:2px solid var(--accent);width:11px;height:11px;
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .orbit-line{flex:1 1 auto;height:1px;background:var(--line);min-width:6px;}
  .orbit-line.done{background:var(--accent);}
  .orbit-caption{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);
    margin-top:8px;
  }

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:28px 26px;box-shadow:0 1px 2px rgba(28,25,23,.04);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;
    color:var(--accent-dark);text-transform:uppercase;margin:0 0 6px;
  }
  h2.step-title{
    font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;
    margin:0 0 4px;color:var(--ink);
  }
  .step-note{color:var(--ink-soft);font-size:13.5px;margin:0 0 22px;white-space:pre-line;}

  .field{margin-bottom:20px;}
  .field label.q{
    display:block;font-weight:600;font-size:14.5px;margin-bottom:5px;color:var(--ink);
  }
  .field .hint{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-faint);
    margin:2px 0 8px;
  }
  input[type=text], input[type=date], input[type=number], textarea, select{
    width:100%;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--ink);
    background:#FBFBFA;border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;outline:none;transition:border-color .15s, background .15s;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--accent);background:#fff;}
  textarea{min-height:76px;resize:vertical;font-family:'Inter',sans-serif;}

  .chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink);
    background:#FBFBFA;border:1px solid var(--line);border-radius:999px;
    padding:8px 14px;cursor:pointer;user-select:none;transition:all .15s;
  }
  .chip:hover{border-color:var(--accent);}
  .chip.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-dark);font-weight:600;}

  table.exam-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
  table.exam-table th{
    font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
    color:var(--ink-faint);text-align:left;padding:4px 6px;font-weight:500;
  }
  table.exam-table td{padding:4px 6px;}
  table.exam-table input{padding:7px 9px;font-size:13px;}
  .row-remove{
    background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;
    padding:0 6px;
  }
  .add-row-btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent-dark);
    background:none;border:1px dashed var(--accent);border-radius:8px;padding:6px 12px;
    cursor:pointer;margin-right:8px;margin-bottom:6px;
  }
  .preset-btn{
    font-family:'Inter',sans-serif;font-size:12.5px;color:var(--accent-dark);
    background:var(--accent-soft);border:1px solid var(--accent);border-radius:999px;
    padding:6px 13px;cursor:pointer;margin-right:8px;margin-bottom:6px;
  }
  .preset-row{margin-bottom:8px;}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:10px;}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;border-radius:9px;
    padding:11px 20px;cursor:pointer;border:none;transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:none;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink-faint);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .autosave{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);
    text-align:center;margin-top:14px;min-height:14px;transition:opacity .3s;
  }

  .landing-actions{display:flex;flex-direction:column;gap:12px;margin-top:22px;}
  .required-mark{color:var(--danger);}
  .confirm-box{
    background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;
    padding:16px;display:flex;gap:10px;align-items:flex-start;margin-top:6px;margin-bottom:14px;
  }
  .confirm-box input{width:auto;margin-top:3px;flex-shrink:0;}
  .confirm-box label{font-size:13.5px;color:var(--ink);line-height:1.5;}

  .warn-box{
    background:#FBF3E7;border:1px solid var(--gold);border-radius:10px;
    padding:12px 14px;font-size:12.5px;color:#6B4E12;margin-bottom:16px;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>

  for (var s=0;s<SECTIONS.length;s++){
    for (var f=0;f<SECTIONS[s].fields.length;f++){
      if (SECTIONS[s].fields[f].id===id) return SECTIONS[s].fields[f];
    }
  }
  return null;
}

var state = { view:"loading", answers:{}, step:0, saveMsg:"", hayBorrador:false };

function getVisibleSections(){
  return SECTIONS.filter(function(s){ return !s.visibleIf || s.visibleIf(state.answers); });
}

function esc(str){
  return String(str==null?"":str).replace(/[&<>"]/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
  });
}

function debounce(fn, ms){
  var t; return function(){ var args=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,args);}, ms); };
}
var doAutosave = debounce(function(){ saveDraft(); }, 700);

function saveDraft(){
  var payload = { answers: state.answers, updatedAt: new Date().toISOString() };
  window.storage.set(DRAFT_KEY, JSON.stringify(payload)).then(function(){
    state.saveMsg = "Guardado ✓";
    renderSaveMsg();
    setTimeout(function(){ state.saveMsg=""; renderSaveMsg(); }, 1500);
  }).catch(function(){
    state.saveMsg = "No se pudo guardar. Revisa tu conexión.";
    renderSaveMsg();
  });
}

function finalizeSubmission(){
  // Se manda igual que los otros 3 formularios (Regla 16: el paciente nunca
  // ve el resultado, así que no necesitamos leer la respuesta del servidor).
  var payload = Object.assign({}, state.answers, { formType: TIPO_DE_FORMULARIO });
  return fetch(QUANTUM_ENDPOINT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
}

function applyDefaults(){
  var todayField = fieldById("fecha_consulta");
  if (todayField && !state.answers.fecha_consulta){
    state.answers.fecha_consulta = new Date().toISOString().slice(0,10);
  }
}

function init(){
  window.storage.get(DRAFT_KEY).then(function(res){
    state.hayBorrador = !!(res && res.value);
    state.view = "landing";
    render();
  }).catch(function(){
    state.view = "landing";
    render();
  });
}

function empezarNueva(){
  state.answers = {};
  state.step = 0;
  applyDefaults();
  state.view = "form";
  render();
}

function reanudarBorrador(){
  window.storage.get(DRAFT_KEY).then(function(res){
    if (res && res.value){
      try { state.answers = JSON.parse(res.value).answers || {}; } catch(e){ state.answers = {}; }
    }
    applyDefaults();
    state.step = 0;
    state.view = "form";
    render();
  });
}

function sectionErrors(section){
  var errs = [];
  section.fields.forEach(function(f){
    if (f.showIf && !f.showIf(state.answers)) return;
    if (!f.required) return;
    var v = state.answers[f.id];
    if (f.type==="confirm"){ if(!v) errs.push(f.id); return; }
    if (v===undefined || v===null || v===""){ errs.push(f.id); }
  });
  return errs;
}

function renderField(f){
  if (f.showIf && !f.showIf(state.answers)) return "";
  var val = state.answers[f.id];
  var reqMark = f.required ? ' <span class="required-mark">*</span>' : "";
  var hint = f.hint ? '<div class="hint">'+esc(f.hint)+'</div>' : "";

  if (f.type==="text" || f.type==="date"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<input type="'+f.type+'" value="'+esc(val||"")+'" oninput="HCD.onTextInput(\''+f.id+'\', this.value)">'+
      '</div>';
  }
  if (f.type==="number"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<input type="number" step="'+(f.step||1)+'" value="'+esc(val||"")+'" oninput="HCD.onTextInput(\''+f.id+'\', this.value)">'+
      '</div>';
  }
  if (f.type==="textarea"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<textarea oninput="HCD.onTextInput(\''+f.id+'\', this.value)">'+esc(val||"")+'</textarea>'+
      '</div>';
  }
  if (f.type==="radio"){
    var chips = f.options.map(function(o){
      var sel = val===o ? " selected":"";
      return '<div class="chip'+sel+'" onclick="HCD.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\',false)">'+esc(o)+'</div>';
    }).join("");
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+'<div class="chip-grid">'+chips+'</div></div>';
  }
  if (f.type==="checkbox"){
    var arr = val || [];
    var chips2 = f.options.map(function(o){
      var sel = arr.indexOf(o)>-1 ? " selected":"";
      return '<div class="chip'+sel+'" onclick="HCD.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\',true)">'+esc(o)+'</div>';
    }).join("");
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+'<div class="chip-grid">'+chips2+'</div></div>';
  }
  if (f.type==="scale"){
    var n = val || null;
    var btns = "";
    for (var i=0;i<=10;i++){
      btns += '<div class="chip'+(n==i?" selected":"")+'" style="flex:1;text-align:center;" onclick="HCD.onChoice(\''+f.id+'\','+i+',false)">'+i+'</div>';
    }
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+
      '<div class="chip-grid" style="flex-wrap:nowrap;">'+btns+'</div>'+
      '<div class="hint" style="display:flex;justify-content:space-between;"><span>'+esc(f.left)+'</span><span>'+esc(f.right)+'</span></div></div>';
  }
  if (f.type==="table"){
    var rows = val || [];
    var head = '<tr>'+f.columns.map(function(c){return '<th>'+esc(c[1])+'</th>';}).join("")+'<th></th></tr>';
    var body = rows.map(function(row, idx){
      return '<tr>'+f.columns.map(function(c){
        return '<td><input type="text" value="'+esc(row[c[0]]||"")+'" oninput="HCD.onTableInput(\''+f.id+'\','+idx+',\''+c[0]+'\',this.value)"></td>';
      }).join("")+'<td><button type="button" class="row-remove" onclick="HCD.onTableRemove(\''+f.id+'\','+idx+')">✕</button></td></tr>';
    }).join("");
    var presetBtns = "";
    if (f.presets && f.presets.length){
      presetBtns = '<div class="preset-row">'+f.presets.map(function(p, pidx){
        return '<button type="button" class="preset-btn" onclick="HCD.onTablePreset(\''+f.id+'\','+pidx+')">'+esc(p.label)+'</button>';
      }).join("")+'</div>';
    }
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      presetBtns+
      '<table class="exam-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>'+
      '<button type="button" class="add-row-btn" onclick="HCD.onTableAdd(\''+f.id+'\')">+ agregar renglón</button></div>';
  }
  if (f.type==="confirm"){
    var checked = val ? "checked" : "";
    return '<div class="confirm-box"><input type="checkbox" '+checked+' onchange="HCD.onConfirm(\''+f.id+'\',this.checked)">'+
      '<label>'+esc(f.label)+'</label></div>';
  }
  return "";
}

function renderOrbit(){
  var secs = getVisibleSections();
  var nodes = "";
  secs.forEach(function(s, i){
    var cls = i < state.step ? "done" : (i===state.step ? "current" : "");
    nodes += '<div class="orbit-node '+cls+'"></div>';
    if (i < secs.length-1){
      nodes += '<div class="orbit-line '+(i<state.step?"done":"")+'"></div>';
    }
  });
  return '<div class="orbit-wrap"><div class="orbit-track">'+nodes+'</div>'+
    '<div class="orbit-caption">PASO '+(state.step+1)+' DE '+secs.length+'</div></div>';
}

function renderSaveMsg(){
  var el = document.getElementById("hcd-savemsg");
  if (el) el.textContent = state.saveMsg;
}

function renderLanding(){
  return ''+
    '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div>'+
    '<div class="brand-tag">Historia Clínica Digital · Uso interno</div></div>'+
    '<div class="card">'+
    '<p class="eyebrow">Consulta presencial</p>'+
    '<h2 class="step-title">Historia Clínica Digital</h2>'+
    '<p class="step-note">Reemplaza el paso de escribir en Word y pegar el texto en el Sheet. Se llena directo en consulta y alimenta el mismo pipeline: Plan Integral con Claude, expediente del paciente, y consentimientos informados de los procedimientos que marques.</p>'+
    '<div class="warn-box">Este formulario no sustituye tu criterio clínico ni ningún consentimiento informado firmado en papel — es la captura estructurada de lo que ya evalúas en consulta.</div>'+
    '<div class="landing-actions">'+
    '<button class="btn btn-primary" onclick="HCD.empezarNueva()">Nueva Historia Clínica</button>'+
    (state.hayBorrador ? '<button class="btn btn-ghost" onclick="HCD.reanudarBorrador()">Reanudar borrador guardado</button>' : '')+
    '</div>'+
    '</div>';
}

function renderForm(){
  var secs = getVisibleSections();
  if (state.step >= secs.length) state.step = secs.length-1;
  var section = secs[state.step];
  var isLast = state.step === secs.length-1;
  var isFirst = state.step === 0;

  var fieldsHtml = section.fields.map(renderField).join("");

  var out = "";
  out += '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div>'+
    '<div class="brand-tag">Historia Clínica Digital · Uso interno</div></div>';
  out += renderOrbit();
  out += '<div class="card">';
  out += '<p class="eyebrow">'+esc(section.eyebrow)+'</p>';
  out += '<h2 class="step-title">'+esc(section.title)+'</h2>';
  if (section.note) out += '<p class="step-note">'+esc(section.note)+'</p>';
  out += fieldsHtml;
  out += '<div class="nav-row">';
  out += isFirst ? '<button class="btn btn-ghost" onclick="HCD.backToLanding()">← Inicio</button>' : '<button class="btn btn-ghost" onclick="HCD.prevStep()">← Atrás</button>';
  out += isLast
    ? '<button class="btn btn-primary" onclick="HCD.submitForm()">Enviar Historia Clínica</button>'
    : '<button class="btn btn-primary" onclick="HCD.nextStep()">Siguiente →</button>';
  out += '</div>';
  out += '<div class="autosave" id="hcd-savemsg">'+esc(state.saveMsg)+'</div>';
  out += '</div>';
  return out;
}

function renderDone(){
  return '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div></div>'+
    '<div class="card">'+
    '<p class="eyebrow">Listo</p>'+
    '<h2 class="step-title">Historia Clínica enviada</h2>'+
    '<p class="step-note">Se está generando el Plan Integral, el expediente del paciente y, si aplica, los consentimientos informados de los procedimientos marcados. Revisa tu correo o el Sheet en unos momentos.</p>'+
    '<div class="landing-actions"><button class="btn btn-primary" onclick="HCD.empezarNueva()">Levantar otra Historia Clínica</button></div>'+
    '</div>';
}

function render(){
  var app = document.getElementById("hcd-app");
  if (state.view==="loading") app.innerHTML = "Cargando…";
  else if (state.view==="landing") app.innerHTML = renderLanding();
  else if (state.view==="form") app.innerHTML = renderForm();
  else if (state.view==="done") app.innerHTML = renderDone();
}

var HCD = {
  empezarNueva: empezarNueva,
  reanudarBorrador: reanudarBorrador,
  backToLanding: function(){ state.view="landing"; render(); },
  onTextInput: function(id, value){
    state.answers[id] = value;
    doAutosave();
  },
  onChoice: function(id, value, multi){
    if (multi){
      var arr = (state.answers[id]||[]).slice();
      var idx = arr.indexOf(value);
      if (idx>-1) arr.splice(idx,1); else arr.push(value);
      state.answers[id] = arr;
    } else {
      state.answers[id] = (typeof value==="string") ? value : Number(value);
    }
    doAutosave();
    render();
  },
  onConfirm: function(id, checked){
    state.answers[id] = checked;
    doAutosave();
  },
  onTableAdd: function(id){
    var arr = (state.answers[id]||[]).slice();
    arr.push({});
    state.answers[id]=arr;
    render();
  },
  onTablePreset: function(id, presetIdx){
    var f = fieldById(id);
    var preset = f.presets[presetIdx];
    var arr = (state.answers[id]||[]).slice();
    state.answers[id] = arr.concat(preset.rows.map(function(r){ return Object.assign({}, r); }));
    doAutosave();
    render();
  },
  onTableRemove: function(id, idx){
    var arr = (state.answers[id]||[]).slice();
    arr.splice(idx,1);
    state.answers[id]=arr;
    doAutosave();
    render();
  },
  onTableInput: function(id, idx, col, value){
    var arr = (state.answers[id]||[]).slice();
    if (!arr[idx]) arr[idx]={};
    arr[idx][col]=value;
    state.answers[id]=arr;
    doAutosave();
  },
  nextStep: function(){
    var secs = getVisibleSections();
    var errs = sectionErrors(secs[state.step]);
    if (errs.length){
      alert("Por favor completa los campos obligatorios antes de continuar.");
      return;
    }
    if (state.step < secs.length-1){ state.step++; window.scrollTo(0,0); render(); }
  },
  prevStep: function(){
    if (state.step>0){ state.step--; window.scrollTo(0,0); render(); }
  },
  submitForm: function(){
    var secs = getVisibleSections();
    var errs = sectionErrors(secs[state.step]);
    if (errs.length){
      alert("Por favor completa los campos obligatorios antes de enviar.");
      return;
    }
    finalizeSubmission().then(function(){
      window.storage.set(DRAFT_KEY, "");
      state.view = "done";
      render();
    }).catch(function(){
      alert("No se pudo enviar. Revisa tu conexión e intenta de nuevo.");
    });
  }
};
window.HCD = HCD;

init();

})();
</script>
