<style>
  #sqm-root{
    --qr:#C8102E; --qrl:rgba(200,16,46,0.055);
    --bg:#F3F1EF; --surface-2:#FFFFFF;
    --border:#E7E4E2; --border-strong:#C7C2BE;
    --text-primary:#1C1917; --text-secondary:#57534E; --text-muted:#8A8580;
    --radius:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:var(--bg); padding:28px 14px; min-height:100vh; box-sizing:border-box;
  }
  #sqm-root *{box-sizing:border-box;}
  #sqm-root .shell{max-width:440px;margin:0 auto;background:var(--surface-2);border:.5px solid var(--border);border-radius:12px;overflow:hidden;}
  #sqm-root .pad{padding:1.5rem;}
  #sqm-root .header{padding:1.25rem 1.25rem .75rem;border-bottom:.5px solid var(--border);}
  #sqm-root .eyebrow{font-size:11px;font-weight:600;color:var(--qr);letter-spacing:.08em;text-transform:uppercase;margin:0 0 6px;}
  #sqm-root .title{font-size:19px;font-weight:600;color:var(--text-primary);margin:0;}
  #sqm-root .subtitle{font-size:13px;color:var(--text-secondary);margin:4px 0 0;line-height:1.5;}
  #sqm-root .body{padding:1.1rem 1.25rem .25rem;}
  #sqm-root .field{margin-bottom:1.1rem;}
  #sqm-root .q-label{display:block;font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:6px;}
  #sqm-root .q-hint{display:block;font-size:12px;color:var(--text-muted);margin:-2px 0 8px;}
  #sqm-root .divider{height:.5px;background:var(--border);margin:1.1rem 0;}

  #sqm-root input[type=text], #sqm-root input[type=number], #sqm-root textarea{
    width:100%;font-family:inherit;font-size:14px;color:var(--text-primary);
    background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
    padding:10px 12px;outline:none;
  }
  #sqm-root input:focus, #sqm-root textarea:focus{border-color:var(--qr);}
  #sqm-root textarea{resize:vertical;font-family:inherit;}

  #sqm-root .opt-row-row{display:flex;flex-wrap:wrap;gap:7px;}
  #sqm-root .opt-row-btn{flex:1;padding:10px 13px;border-radius:var(--radius);border:1.5px solid var(--border);
    background:var(--surface-2);color:var(--text-primary);font-size:14px;font-weight:400;cursor:pointer;
    text-align:center;line-height:1.35;font-family:inherit;}
  #sqm-root .opt-row-btn.selected{border-color:var(--qr);background:var(--qrl);color:var(--qr);font-weight:500;}

  #sqm-root .opt-list-col{display:flex;flex-direction:column;gap:7px;}
  #sqm-root .opt-list-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 13px;
    border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface-2);
    color:var(--text-primary);font-size:14px;font-weight:400;cursor:pointer;text-align:left;
    line-height:1.35;font-family:inherit;}
  #sqm-root .opt-list-btn.selected{border-color:var(--qr);background:var(--qrl);color:var(--qr);font-weight:500;}
  #sqm-root .opt-circle{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border-strong);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  #sqm-root .opt-list-btn.selected .opt-circle{border:2px solid var(--qr);background:var(--qr);}
  #sqm-root .opt-circle-dot{width:5px;height:5px;border-radius:50%;background:#fff;display:none;}
  #sqm-root .opt-list-btn.selected .opt-circle-dot{display:block;}

  #sqm-root .slider-row{display:flex;align-items:center;gap:10px;}
  #sqm-root .slider-value{font-size:22px;font-weight:500;color:var(--qr);min-width:52px;flex-shrink:0;}
  #sqm-root .slider-unit{font-size:12px;color:var(--text-muted);flex-shrink:0;}
  #sqm-root input[type=range]{flex:1;accent-color:var(--qr);}

  #sqm-root .btn-primary{height:42px;background:var(--qr);border:none;border-radius:var(--radius);color:#fff;
    font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s;}
  #sqm-root .btn-primary:disabled{opacity:.65;cursor:not-allowed;}
  #sqm-root .link-box{background:var(--qrl);border:1px solid var(--qr);border-radius:10px;padding:12px 14px;
    font-size:12.5px;word-break:break-all;color:var(--qr);font-family:monospace;}
  #sqm-root .footer-link{text-align:center;margin-top:18px;font-size:12px;color:var(--text-muted);}
  #sqm-root .footer-link a{cursor:pointer;text-decoration:underline;color:inherit;}
  #sqm-root .err-msg{padding:0 1.25rem .75rem;font-size:12px;color:var(--qr);line-height:1.5;}
  #sqm-root .save-msg{text-align:center;padding:0 0 14px;font-size:11px;font-family:monospace;color:var(--text-muted);min-height:14px;}
  #sqm-root .done-wrap{padding:2.25rem 1.5rem;text-align:center;}
  #sqm-root .done-icon{width:52px;height:52px;background:var(--qrl);border-radius:50%;margin:0 auto 1rem;
    display:flex;align-items:center;justify-content:center;}
  #sqm-root .done-title{font-size:19px;font-weight:600;margin:0 0 8px;color:var(--text-primary);}
  #sqm-root .done-text{font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0;}

  #sqm-root .dash-row{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;
    border-bottom:.5px solid var(--border);cursor:pointer;}
  #sqm-root .dash-row:hover{background:var(--qrl);}
  #sqm-root .dash-name{font-weight:600;font-size:14px;color:var(--text-primary);}
  #sqm-root .dash-meta{font-size:11px;color:var(--text-muted);font-family:monospace;}
  #sqm-root .badge{font-size:10px;text-transform:uppercase;padding:3px 8px;border-radius:999px;}
  #sqm-root .badge.completo{background:var(--qrl);color:var(--qr);}
  #sqm-root .badge.borrador{background:#F3EBD9;color:#946C1F;}
  #sqm-root .summary-item{font-size:13.5px;margin-bottom:6px;}
  #sqm-root .summary-item .k{color:var(--text-secondary);}
  #sqm-root .summary-item .v{font-weight:500;color:var(--text-primary);}
  #sqm-root .confirm-box{background:var(--qrl);border:1px solid var(--qr);border-radius:10px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start;}
  #sqm-root .confirm-box input{width:auto;margin-top:3px;flex-shrink:0;}
  #sqm-root .confirm-box label{font-size:13px;color:var(--text-primary);line-height:1.5;}
  #sqm-root .note-text{font-size:12.5px;color:var(--text-secondary);line-height:1.5;margin:0 0 .9rem;}

  @media (prefers-reduced-motion: reduce){ #sqm-root *{transition:none !important;} }
</style>

<div id="sqm-root"><div id="sqm-app">Cargando…</div></div>

<script>
(function(){

// Polyfill de almacenamiento: window.storage no existe en un navegador real
// (solo existía en el entorno de vista previa donde se armó este formulario).
// Esta versión usa localStorage, que sí está disponible en cualquier
// navegador real (Chrome, Safari, Edge, etc.), con la misma forma de uso
// (set/get/list que devuelven promesas) para no tener que tocar el resto
// del código de autoguardado.
if (!window.storage) {
  window.storage = {
    set: function (key, value) {
      try { localStorage.setItem(key, value); return Promise.resolve(); }
      catch (e) { return Promise.reject(e); }
    },
    get: function (key) {
      try { return Promise.resolve({ value: localStorage.getItem(key) }); }
      catch (e) { return Promise.reject(e); }
    },
    list: function (prefix) {
      try {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf(prefix) === 0) keys.push(k);
        }
        return Promise.resolve({ keys: keys });
      } catch (e) { return Promise.reject(e); }
    }
  };
}

var CLINIC_PASSCODE = "quantum2026";
var STORAGE_PREFIX = "seg_mini:";
var ADHERENCIA = ["Excelente", "Buena, con ajustes", "Irregular", "Baja"];

// Pipeline de Quantum (Apps Script) — pegar aquí la URL que da Apps Script
// al publicar el Web App (Paso 6 de la guía). Termina en /exec
var QUANTUM_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyPlwngjrtCVjw9_MCP7Aqliqh4QzhGmLiyZFjJmNnpslnx2VKJqYXkJhAeQ2_kfRyP/exec';
var TIPO_DE_FORMULARIO = 'preconsulta';

var FIELDS = [
  {id:"nombre", type:"text", label:"¿Cuál es tu nombre?", placeholder:"Nombre completo"},
  // El teléfono es la clave con la que el sistema vincula este resumen a tu expediente.
  {id:"telefono", type:"text", label:"¿Cuál es tu teléfono / WhatsApp?", placeholder:"10 dígitos, el mismo que diste la primera vez", required:true},
  {id:"peso", type:"slider", label:"¿Cuánto pesas actualmente?", min:30, max:250, unit:"kg", def:75},
  {type:"divider"},
  {id:"adherencia", type:"list", label:"¿Qué tanto seguiste tu plan desde la última consulta?", options:ADHERENCIA},
  {id:"disponibilidad", type:"row", label:"¿Sigue igual tu disponibilidad para entrenar (días/horario)?", options:["Sigue igual","Cambió"]},
  {id:"disponibilidadDetalle", type:"text", label:"Cuéntanos qué cambió", placeholder:"Nuevos días/horarios disponibles",
    showIf:function(a){return a.disponibilidad==="Cambió";}},
  {type:"divider"},
  {id:"novedades", type:"textarea", label:"¿Algo nuevo que el Dr. Castro deba saber antes de tu cita?",
    hint:"Lesión nueva, cambio de medicamentos, síntomas, molestias...", placeholder:"Si no hay nada nuevo, escribe 'nada'", rows:3},
  {id:"enFarmacologia", type:"row", label:"¿Sigues actualmente algún protocolo farmacológico indicado por el Dr. Castro?", options:["Sí","No"]},
  {id:"farmacoTolerancia", type:"textarea", label:"¿Cómo te ha sentado?", placeholder:"Tolerancia, efectos, dudas para platicar en consulta...",
    showIf:function(a){return a.enFarmacologia==="Sí";}},
  {type:"divider"},
  {type:"note", text:"AVISO DE PRIVACIDAD (resumen): tus datos, incluidos datos de salud, se usan únicamente para tu atención clínica en Quantum Fitness & Health. Parte del proceso interno se apoya en un sistema de inteligencia artificial (Anthropic/Claude), siempre bajo revisión y aprobación del Dr. Castro. Conservamos tu expediente un mínimo de 5 años (NOM-004-SSA3-2012). Puedes ejercer tus derechos ARCO contactando directamente al consultorio."},
  {id:"aviso_privacidad_aceptado", type:"confirm", required:true, label:"He leído y acepto el Aviso de Privacidad de Quantum Fitness & Health para el tratamiento de mis datos personales, incluidos datos de salud."}
];

function esc(str){
  return String(str==null?"":str).replace(/[&<>"]/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
  });
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function debounce(fn, ms){ var t; return function(){ var a=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,a);},ms); }; }

var state = { view:"loading", id:null, answers:{}, saveMsg:"", dashList:[], dashDetail:null, submitting:false, submitError:false };

function applyDefaults(){
  FIELDS.forEach(function(f){
    if (f.id && f.def!==undefined && state.answers[f.id]===undefined) state.answers[f.id]=f.def;
  });
}

function parseHash(){
  var h = window.location.hash || "";
  var m = h.match(/id=([a-z0-9]+)/i);
  return m ? m[1] : null;
}

var doAutosave = debounce(function(){ saveDraft(); }, 700);

function saveDraft(){
  if(!state.id) return;
  var payload = { id: state.id, answers: state.answers, status:"borrador", updatedAt:new Date().toISOString() };
  window.storage.set(STORAGE_PREFIX+state.id, JSON.stringify(payload), true).then(function(){
    state.saveMsg="Guardado ✓"; paintSaveMsg();
    setTimeout(function(){ state.saveMsg=""; paintSaveMsg(); }, 1500);
  }).catch(function(){ state.saveMsg="No se pudo guardar. Revisa tu conexión."; paintSaveMsg(); });
}

function finalizeSubmission(){
  // Enviar los datos al pipeline de Quantum (Apps Script) en vez de a Formspree.
  // mode:'no-cors' es intencional (Regla 16: el paciente nunca ve el plan
  // generado, así que no necesitamos leer la respuesta del servidor).
  var payload = Object.assign({}, state.answers, { formType: TIPO_DE_FORMULARIO });
  return fetch(QUANTUM_ENDPOINT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
}

function loadDraft(id){
  return window.storage.get(STORAGE_PREFIX+id, true).then(function(res){
    if(res && res.value){ state.answers = JSON.parse(res.value).answers || {}; }
  }).catch(function(){});
}

function init(){
  var existingId = parseHash();
  if (existingId){
    state.id = existingId;
    loadDraft(existingId).then(function(){
      applyDefaults();
      state.view="form";
      render();
    });
  } else {
    state.view="landing";
    render();
  }
}

function startNewPatientLink(){
  state.id = uid();
  window.location.hash = "id="+state.id;
  state.answers = {};
  applyDefaults();
  state.view = "share";
  render();
}

function goToDashboard(){
  var pass = window.prompt("Acceso equipo clínico — código:");
  if (pass !== CLINIC_PASSCODE){ if(pass!==null) alert("Código incorrecto."); return; }
  state.view="dashboard"; state.dashList=[]; render();
  window.storage.list(STORAGE_PREFIX, true).then(function(res){
    var keys=(res&&res.keys)||[];
    Promise.all(keys.map(function(k){
      return window.storage.get(k, true).then(function(r){ try{return JSON.parse(r.value);}catch(e){return null;} }).catch(function(){return null;});
    })).then(function(list){
      state.dashList = list.filter(Boolean).sort(function(a,b){ return (b.updatedAt||"").localeCompare(a.updatedAt||""); });
      render();
    });
  });
}

/* ---------- render helpers ---------- */
function renderField(f){
  if (f.type==="divider") return '<div class="divider"></div>';
  if (f.type==="note") return '<p class="note-text">'+esc(f.text)+'</p>';
  if (f.showIf && !f.showIf(state.answers)) return "";
  var val = state.answers[f.id];
  var hint = f.hint ? '<span class="q-hint">'+esc(f.hint)+'</span>' : "";

  if (f.type==="text"){
    return '<div class="field"><label class="q-label">'+esc(f.label)+'</label>'+hint+
      '<input type="text" value="'+esc(val||"")+'" placeholder="'+esc(f.placeholder||"")+'" oninput="SQ.onText(\''+f.id+'\',this.value)"></div>';
  }
  if (f.type==="textarea"){
    return '<div class="field"><label class="q-label">'+esc(f.label)+'</label>'+hint+
      '<textarea rows="'+(f.rows||2)+'" placeholder="'+esc(f.placeholder||"")+'" oninput="SQ.onText(\''+f.id+'\',this.value)">'+esc(val||"")+'</textarea></div>';
  }
  if (f.type==="slider"){
    var v = (val===undefined?f.def:val);
    return '<div class="field"><label class="q-label">'+esc(f.label)+'</label>'+
      '<div class="slider-row"><span class="slider-value" id="sqm-val-'+f.id+'">'+esc(v)+'</span>'+
      (f.unit?'<span class="slider-unit">'+esc(f.unit)+'</span>':'')+
      '<input type="range" min="'+f.min+'" max="'+f.max+'" value="'+esc(v)+'" oninput="SQ.onSlider(\''+f.id+'\',this.value)"></div></div>';
  }
  if (f.type==="row"){
    var rowbtns = f.options.map(function(o){
      var sel = val===o ? " selected":"";
      return '<button type="button" class="opt-row-btn'+sel+'" onclick="SQ.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\')">'+esc(o)+'</button>';
    }).join("");
    return '<div class="field"><label class="q-label">'+esc(f.label)+'</label><div class="opt-row-row">'+rowbtns+'</div></div>';
  }
  if (f.type==="list"){
    var listbtns = f.options.map(function(o){
      var sel = val===o ? " selected":"";
      return '<button type="button" class="opt-list-btn'+sel+'" onclick="SQ.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\')">'+
        '<span class="opt-circle"><span class="opt-circle-dot"></span></span>'+esc(o)+'</button>';
    }).join("");
    return '<div class="field"><label class="q-label">'+esc(f.label)+'</label><div class="opt-list-col">'+listbtns+'</div></div>';
  }
  if (f.type==="confirm"){
    var checked = val ? "checked" : "";
    return '<div class="field confirm-box"><input type="checkbox" '+checked+' onchange="SQ.onConfirm(\''+f.id+'\',this.checked)">'+
      '<label>'+esc(f.label)+'</label></div>';
  }
  return "";
}

function paintSaveMsg(){ var el=document.getElementById("sqm-savemsg"); if(el) el.textContent=state.saveMsg; }

function renderLanding(){
  return '<div class="shell"><div class="pad">'+
    '<p class="eyebrow">QUANTUM FITNESS &amp; HEALTH</p>'+
    '<h2 class="title">Generar mini-formulario presencial</h2>'+
    '<p class="subtitle" style="margin-bottom:18px;">Genera el enlace de este paciente. Sus respuestas se guardan automáticamente ahí mismo — nada de archivos sueltos.</p>'+
    '<button type="button" class="btn-primary" onclick="SQ.startNewPatientLink()">Generar enlace para nuevo paciente</button>'+
    '<div class="footer-link"><a onclick="SQ.goToDashboard()">Acceso equipo clínico — ver respuestas guardadas</a></div>'+
    '</div></div>';
}

function renderShare(){
  return '<div class="shell"><div class="pad">'+
    '<p class="eyebrow">Enlace de este paciente</p>'+
    '<div class="link-box">'+esc(window.location.href)+'</div>'+
    '<p class="subtitle" style="margin:12px 0 18px;">Envía este enlace a tu paciente. Si cierra la pestaña, al reabrirlo continuará donde se quedó.</p>'+
    '<button type="button" class="btn-primary" onclick="SQ.dismissShare()">Comenzar cuestionario</button>'+
    '</div></div>';
}

function renderForm(){
  var body = FIELDS.map(renderField).join("");
  var out = '<div class="shell">';
  out += '<div class="header"><p class="eyebrow">QUANTUM FITNESS &amp; HEALTH</p>'+
    '<h2 class="title">Antes de tu cita</h2>'+
    '<p class="subtitle">Solo unas preguntas rápidas — lo demás lo revisamos juntos en consulta. Menos de 1 minuto.</p></div>';
  out += '<div class="body">'+body+'</div>';
  if (state.submitError) out += '<div class="err-msg">No pudimos enviar tus respuestas. Revisa tu conexión e intenta de nuevo.</div>';
  out += '<div class="pad" style="padding-top:0;"><button type="button" class="btn-primary" '+(state.submitting?"disabled":"")+' onclick="SQ.submitForm()">'+(state.submitting?"Enviando...":"Enviar antes de mi cita →")+'</button></div>';
  out += '<div class="save-msg" id="sqm-savemsg">'+esc(state.saveMsg)+'</div>';
  out += '</div>';
  return out;
}

function renderDone(){
  var first = (state.answers.nombre||"").split(" ")[0]||"";
  return '<div class="shell"><div class="done-wrap">'+
    '<div class="done-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#C8102E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<h2 class="done-title">¡Listo'+(first?", "+esc(first):"")+'!</h2>'+
    '<p class="done-text">Nos vemos en tu cita. El Dr. Castro ya tiene este contexto antes de tu revisión.</p>'+
    '</div></div>';
}

function renderDashboard(){
  var out = '<div class="shell"><div class="pad">';
  out += '<p class="eyebrow">Equipo clínico</p><h2 class="title">Mini-formularios recibidos</h2>';
  if (!state.dashList.length){ out += '<p class="subtitle" style="margin-top:10px;">Cargando o aún no hay respuestas guardadas…</p>'; }
  else {
    state.dashList.forEach(function(sub){
      var a = sub.answers||{};
      var date = sub.updatedAt ? new Date(sub.updatedAt).toLocaleString() : "";
      out += '<div class="dash-row" onclick="SQ.openDashDetail(\''+sub.id+'\')">'+
        '<div><div class="dash-name">'+esc(a.nombre||"(sin nombre)")+'</div><div class="dash-meta">'+esc(date)+'</div></div>'+
        '<span class="badge '+(sub.status==="completo"?"completo":"borrador")+'">'+esc(sub.status||"borrador")+'</span></div>';
    });
  }
  out += '<div class="footer-link" style="margin-top:16px;"><a onclick="SQ.backToLanding()">← Volver</a></div>';
  out += '</div></div>';
  return out;
}

function renderDashDetail(){
  var sub = state.dashDetail, a = sub.answers||{};
  var items = FIELDS.filter(function(f){return f.id;}).map(function(f){
    var v = a[f.id];
    if (v===undefined||v===null||v==="") return "";
    var display = f.type==="slider" ? v+" "+(f.unit||"") : v;
    return '<div class="summary-item"><span class="k">'+esc(f.label)+': </span><span class="v">'+esc(display)+'</span></div>';
  }).join("");
  return '<div class="shell"><div class="pad">'+
    '<p class="eyebrow">Detalle del mini-formulario</p><h2 class="title">'+esc(a.nombre||"(sin nombre)")+'</h2>'+
    '<div style="margin-top:14px;">'+items+'</div>'+
    '<div class="footer-link" style="margin-top:16px;"><a onclick="SQ.goToDashboard()">← Volver al panel</a></div>'+
    '</div></div>';
}

function render(){
  var app = document.getElementById("sqm-app");
  if (state.view==="loading") app.innerHTML = '<div class="shell"><div class="pad" style="text-align:center;color:var(--text-muted);">Cargando…</div></div>';
  else if (state.view==="landing") app.innerHTML = renderLanding();
  else if (state.view==="share") app.innerHTML = renderShare();
  else if (state.view==="form") app.innerHTML = renderForm();
  else if (state.view==="done") app.innerHTML = renderDone();
  else if (state.view==="dashboard") app.innerHTML = renderDashboard();
  else if (state.view==="dash-detail") app.innerHTML = renderDashDetail();
}

window.SQ = {
  startNewPatientLink: startNewPatientLink,
  dismissShare: function(){ state.view="form"; render(); },
  goToDashboard: goToDashboard,
  backToLanding: function(){ window.location.hash=""; state.view="landing"; render(); },
  openDashDetail: function(id){
    state.dashDetail = state.dashList.filter(function(s){return s.id===id;})[0];
    state.view="dash-detail"; render();
  },
  onText: function(id, value){ state.answers[id]=value; doAutosave(); },
  onSlider: function(id, value){
    state.answers[id]=Number(value);
    var el=document.getElementById("sqm-val-"+id); if(el) el.textContent=value;
    doAutosave();
  },
  onChoice: function(id, value){
    state.answers[id] = value;
    doAutosave();
    render();
  },
  onConfirm: function(id, checked){
    state.answers[id] = checked;
    doAutosave();
  },
  submitForm: function(){
    var faltanRequeridos = FIELDS.some(function(f){
      return f.required && (f.showIf ? f.showIf(state.answers) : true) && !state.answers[f.id];
    });
    if (faltanRequeridos){
      alert("Para poder enviar necesitamos que aceptes el Aviso de Privacidad.");
      return;
    }
    state.submitting = true; state.submitError=false; render();
    finalizeSubmission().then(function(){
      state.submitting=false; state.view="done"; render();
    }).catch(function(){
      state.submitting=false; state.submitError=true; render();
    });
  }
};

init();

})();
</script>
