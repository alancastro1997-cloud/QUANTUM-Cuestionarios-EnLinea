  Digital inicial (historia_clinica_digital.html), porque acá no se repite
  toda la ficha de identificación ni la exploración física completa, salvo

  LA DIFERENCIA CLAVE con el seguimiento en línea: acá NO hace falta pegar

function fieldById(id){
  for (var s=0;s<SECTIONS.length;s++){
    for (var f=0;f<SECTIONS[s].fields.length;f++){
      if (SECTIONS[s].fields[f].id===id) return SECTIONS[s].fields[f];
    }
  }
  return null;
}

var state = { view:"loading", answers:{}, step:0, saveMsg:"", hayBorrador:false };

function getVisibleSections(){
  return SECTIONS.filter(function(s){ return !s.visibleIf || s.visibleIf(state.answers); });
}

function esc(str){
  return String(str==null?"":str).replace(/[&<>"]/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
  });
}

function debounce(fn, ms){
  var t; return function(){ var args=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,args);}, ms); };
}
var doAutosave = debounce(function(){ saveDraft(); }, 700);

function saveDraft(){
  var payload = { answers: state.answers, updatedAt: new Date().toISOString() };
  window.storage.set(DRAFT_KEY, JSON.stringify(payload)).then(function(){
    state.saveMsg = "Guardado ✓";
    renderSaveMsg();
    setTimeout(function(){ state.saveMsg=""; renderSaveMsg(); }, 1500);
  }).catch(function(){
    state.saveMsg = "No se pudo guardar. Revisa tu conexión.";
    renderSaveMsg();
  });
}

function finalizeSubmission(){
  var payload = Object.assign({}, state.answers, { formType: TIPO_DE_FORMULARIO });
  return fetch(QUANTUM_ENDPOINT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
}

function applyDefaults(){
  var todayField = fieldById("fecha_consulta");
  if (todayField && !state.answers.fecha_consulta){
    state.answers.fecha_consulta = new Date().toISOString().slice(0,10);
  }
}

function init(){
  window.storage.get(DRAFT_KEY).then(function(res){
    state.hayBorrador = !!(res && res.value);
    state.view = "landing";
    render();
  }).catch(function(){
    state.view = "landing";
    render();
  });
}

function empezarNueva(){
  state.answers = {};
  state.step = 0;
  applyDefaults();
  state.view = "form";
  render();
}

function reanudarBorrador(){
  window.storage.get(DRAFT_KEY).then(function(res){
    if (res && res.value){
      try { state.answers = JSON.parse(res.value).answers || {}; } catch(e){ state.answers = {}; }
    }
    applyDefaults();
    state.step = 0;
    state.view = "form";
    render();
  });
}

function sectionErrors(section){
  var errs = [];
  section.fields.forEach(function(f){
    if (f.showIf && !f.showIf(state.answers)) return;
    if (!f.required) return;
    var v = state.answers[f.id];
    if (f.type==="confirm"){ if(!v) errs.push(f.id); return; }
    if (v===undefined || v===null || v===""){ errs.push(f.id); }
  });
  return errs;
}

function renderField(f){
  if (f.showIf && !f.showIf(state.answers)) return "";
  var val = state.answers[f.id];
  var reqMark = f.required ? ' <span class="required-mark">*</span>' : "";
  var hint = f.hint ? '<div class="hint">'+esc(f.hint)+'</div>' : "";

  if (f.type==="text" || f.type==="date"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<input type="'+f.type+'" value="'+esc(val||"")+'" oninput="SGP.onTextInput(\''+f.id+'\', this.value)">'+
      '</div>';
  }
  if (f.type==="number"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<input type="number" step="'+(f.step||1)+'" value="'+esc(val||"")+'" oninput="SGP.onTextInput(\''+f.id+'\', this.value)">'+
      '</div>';
  }
  if (f.type==="textarea"){
    return '<div class="field">'+
      '<label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      '<textarea oninput="SGP.onTextInput(\''+f.id+'\', this.value)">'+esc(val||"")+'</textarea>'+
      '</div>';
  }
  if (f.type==="radio"){
    var chips = f.options.map(function(o){
      var sel = val===o ? " selected":"";
      return '<div class="chip'+sel+'" onclick="SGP.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\',false)">'+esc(o)+'</div>';
    }).join("");
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+'<div class="chip-grid">'+chips+'</div></div>';
  }
  if (f.type==="checkbox"){
    var arr = val || [];
    var chips2 = f.options.map(function(o){
      var sel = arr.indexOf(o)>-1 ? " selected":"";
      return '<div class="chip'+sel+'" onclick="SGP.onChoice(\''+f.id+'\',\''+esc(o).replace(/'/g,"\\'")+'\',true)">'+esc(o)+'</div>';
    }).join("");
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+'<div class="chip-grid">'+chips2+'</div></div>';
  }
  if (f.type==="scale"){
    var n = val || null;
    var btns = "";
    for (var i=0;i<=10;i++){
      btns += '<div class="chip'+(n==i?" selected":"")+'" style="flex:1;text-align:center;" onclick="SGP.onChoice(\''+f.id+'\','+i+',false)">'+i+'</div>';
    }
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+
      '<div class="chip-grid" style="flex-wrap:nowrap;">'+btns+'</div>'+
      '<div class="hint" style="display:flex;justify-content:space-between;"><span>'+esc(f.left)+'</span><span>'+esc(f.right)+'</span></div></div>';
  }
  if (f.type==="table"){
    var rows = val || [];
    var head = '<tr>'+f.columns.map(function(c){return '<th>'+esc(c[1])+'</th>';}).join("")+'<th></th></tr>';
    var body = rows.map(function(row, idx){
      return '<tr>'+f.columns.map(function(c){
        return '<td><input type="text" value="'+esc(row[c[0]]||"")+'" oninput="SGP.onTableInput(\''+f.id+'\','+idx+',\''+c[0]+'\',this.value)"></td>';
      }).join("")+'<td><button type="button" class="row-remove" onclick="SGP.onTableRemove(\''+f.id+'\','+idx+')">✕</button></td></tr>';
    }).join("");
    var presetBtns = "";
    if (f.presets && f.presets.length){
      presetBtns = '<div class="preset-row">'+f.presets.map(function(p, pidx){
        return '<button type="button" class="preset-btn" onclick="SGP.onTablePreset(\''+f.id+'\','+pidx+')">'+esc(p.label)+'</button>';
      }).join("")+'</div>';
    }
    return '<div class="field"><label class="q">'+esc(f.label)+reqMark+'</label>'+hint+
      presetBtns+
      '<table class="exam-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>'+
      '<button type="button" class="add-row-btn" onclick="SGP.onTableAdd(\''+f.id+'\')">+ agregar renglón</button></div>';
  }
  if (f.type==="confirm"){
    var checked = val ? "checked" : "";
    return '<div class="confirm-box"><input type="checkbox" '+checked+' onchange="SGP.onConfirm(\''+f.id+'\',this.checked)">'+
      '<label>'+esc(f.label)+'</label></div>';
  }
  return "";
}

function renderOrbit(){
  var secs = getVisibleSections();
  var nodes = "";
  secs.forEach(function(s, i){
    var cls = i < state.step ? "done" : (i===state.step ? "current" : "");
    nodes += '<div class="orbit-node '+cls+'"></div>';
    if (i < secs.length-1){
      nodes += '<div class="orbit-line '+(i<state.step?"done":"")+'"></div>';
    }
  });
  return '<div class="orbit-wrap"><div class="orbit-track">'+nodes+'</div>'+
    '<div class="orbit-caption">PASO '+(state.step+1)+' DE '+secs.length+'</div></div>';
}

function renderSaveMsg(){
  var el = document.getElementById("sgp-savemsg");
  if (el) el.textContent = state.saveMsg;
}

function renderLanding(){
  return ''+
    '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div>'+
    '<div class="brand-tag">Seguimiento Presencial · Uso interno</div></div>'+
    '<div class="card">'+
    '<p class="eyebrow">Consulta de seguimiento en persona</p>'+
    '<h2 class="step-title">Seguimiento Presencial</h2>'+
    '<p class="step-note">Para pacientes ya conocidos, con plan previo. El sistema busca automáticamente el plan más reciente del paciente en su expediente (por teléfono) y lo usa como base para la actualización — no hace falta pegarlo a mano.</p>'+
    '<div class="warn-box">Este formulario no sustituye tu criterio clínico ni ningún consentimiento informado firmado en papel.</div>'+
    '<div class="landing-actions">'+
    '<button class="btn btn-primary" onclick="SGP.empezarNueva()">Nuevo Seguimiento Presencial</button>'+
    (state.hayBorrador ? '<button class="btn btn-ghost" onclick="SGP.reanudarBorrador()">Reanudar borrador guardado</button>' : '')+
    '</div>'+
    '</div>';
}

function renderForm(){
  var secs = getVisibleSections();
  if (state.step >= secs.length) state.step = secs.length-1;
  var section = secs[state.step];
  var isLast = state.step === secs.length-1;
  var isFirst = state.step === 0;

  var fieldsHtml = section.fields.map(renderField).join("");

  var out = "";
  out += '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div>'+
    '<div class="brand-tag">Seguimiento Presencial · Uso interno</div></div>';
  out += renderOrbit();
  out += '<div class="card">';
  out += '<p class="eyebrow">'+esc(section.eyebrow)+'</p>';
  out += '<h2 class="step-title">'+esc(section.title)+'</h2>';
  if (section.note) out += '<p class="step-note">'+esc(section.note)+'</p>';
  out += fieldsHtml;
  out += '<div class="nav-row">';
  out += isFirst ? '<button class="btn btn-ghost" onclick="SGP.backToLanding()">← Inicio</button>' : '<button class="btn btn-ghost" onclick="SGP.prevStep()">← Atrás</button>';
  out += isLast
    ? '<button class="btn btn-primary" onclick="SGP.submitForm()">Enviar Seguimiento</button>'
    : '<button class="btn btn-primary" onclick="SGP.nextStep()">Siguiente →</button>';
  out += '</div>';
  out += '<div class="autosave" id="sgp-savemsg">'+esc(state.saveMsg)+'</div>';
  out += '</div>';
  return out;
}

function renderDone(){
  return '<div class="brand"><div class="brand-name">QUANTUM FITNESS &amp; HEALTH</div></div>'+
    '<div class="card">'+
    '<p class="eyebrow">Listo</p>'+
    '<h2 class="step-title">Seguimiento enviado</h2>'+
    '<p class="step-note">Se está generando el Plan Integral actualizado usando el plan anterior encontrado en el expediente del paciente, la nota de evolución, y si aplica, los consentimientos informados. Revisa tu correo o el Sheet en unos momentos.</p>'+
    '<div class="landing-actions"><button class="btn btn-primary" onclick="SGP.empezarNueva()">Levantar otro seguimiento</button></div>'+
    '</div>';
}

function render(){
  var app = document.getElementById("sgp-app");
  if (state.view==="loading") app.innerHTML = "Cargando…";
  else if (state.view==="landing") app.innerHTML = renderLanding();
  else if (state.view==="form") app.innerHTML = renderForm();
  else if (state.view==="done") app.innerHTML = renderDone();
}

var SGP = {
  empezarNueva: empezarNueva,
  reanudarBorrador: reanudarBorrador,
  backToLanding: function(){ state.view="landing"; render(); },
  onTextInput: function(id, value){
    state.answers[id] = value;
    doAutosave();
  },
  onChoice: function(id, value, multi){
    if (multi){
      var arr = (state.answers[id]||[]).slice();
      var idx = arr.indexOf(value);
      if (idx>-1) arr.splice(idx,1); else arr.push(value);
      state.answers[id] = arr;
    } else {
      state.answers[id] = (typeof value==="string") ? value : Number(value);
    }
    doAutosave();
    render();
  },
  onConfirm: function(id, checked){
    state.answers[id] = checked;
    doAutosave();
  },
  onTableAdd: function(id){
    var arr = (state.answers[id]||[]).slice();
    arr.push({});
    state.answers[id]=arr;
    render();
  },
  onTablePreset: function(id, presetIdx){
    var f = fieldById(id);
    var preset = f.presets[presetIdx];
    var arr = (state.answers[id]||[]).slice();
    state.answers[id] = arr.concat(preset.rows.map(function(r){ return Object.assign({}, r); }));
    doAutosave();
    render();
  },
  onTableRemove: function(id, idx){
    var arr = (state.answers[id]||[]).slice();
    arr.splice(idx,1);
    state.answers[id]=arr;
    doAutosave();
    render();
  },
  onTableInput: function(id, idx, col, value){
    var arr = (state.answers[id]||[]).slice();
    if (!arr[idx]) arr[idx]={};
    arr[idx][col]=value;
    state.answers[id]=arr;
    doAutosave();
  },
  nextStep: function(){
    var secs = getVisibleSections();
    var errs = sectionErrors(secs[state.step]);
    if (errs.length){
      alert("Por favor completa los campos obligatorios antes de continuar.");
      return;
    }
    if (state.step < secs.length-1){ state.step++; window.scrollTo(0,0); render(); }
  },
  prevStep: function(){
    if (state.step>0){ state.step--; window.scrollTo(0,0); render(); }
  },
  submitForm: function(){
    // Guarda antiduplicado: un doble clic en "Enviar" creaba dos envíos reales
    // (y dos expedientes distintos del mismo paciente).
    if (state.enviando) return;
    var secs = getVisibleSections();
    var errs = sectionErrors(secs[state.step]);
    if (errs.length){
      alert("Por favor completa los campos obligatorios antes de enviar.");
      return;
    }
    state.enviando = true;
    var btns = document.querySelectorAll('.btn-primary');
    for (var i=0;i<btns.length;i++){ btns[i].disabled = true; btns[i].textContent = "Enviando..."; }
    finalizeSubmission().then(function(){
      state.enviando = false;
      window.storage.set(DRAFT_KEY, "");
      state.view = "done";
      render();
    }).catch(function(){
      state.enviando = false;
      render();
      alert("No se pudo enviar. Revisa tu conexión e intenta de nuevo.");
    });
  }
};
window.SGP = SGP;

init();

})();
</script>
